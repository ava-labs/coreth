# This file configures github.com/golangci/golangci-lint.

run:
  timeout: 10m

linters:
  enable:
    - goimports
    - ineffassign
    - misspell
    - unconvert
    - whitespace

issues:
  exclude-rules:
    - path: "_test\\.go"
      text: "SA1019: rand\\.(Seed|Read) has been deprecated since Go 1\\.20"
      linters:
        - staticcheck

    - path-except: "(plugin\\/.+\\.go|.+_ext\\.go)"
      linters:
        - errcheck
        - gosimple
        - govet
        - staticcheck
