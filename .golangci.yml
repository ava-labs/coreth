# This file configures github.com/golangci/golangci-lint.

run:
  timeout: 10m

linters:
  enable:
    - goimports
    - ineffassign
    - misspell
    - unconvert
    - whitespace

issues:
  exclude-rules:
    - path-except: "(plugin\\/.+\\.go|.+_ext\\.go)"
      linters:
        - errcheck
        - staticcheck
