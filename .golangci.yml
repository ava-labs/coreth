# This file configures github.com/golangci/golangci-lint.

run:
  timeout: 10m

linters:
  enable:
    - errorlint
    - goimports
    - ineffassign
    - misspell
    - unconvert
    - whitespace

linters-settings:
  errorlint:
    errorf: false

issues:
  exclude-rules:
    - path-except: "(_ext|plugin\\/.+|libevm.*)\\.go"
      linters:
        - errcheck
        - errorlint
        - gosimple
        - govet
        - staticcheck
